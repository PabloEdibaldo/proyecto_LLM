# Grafana Dashboards Provisioning Configuration
# Automatically imports dashboards from the dashboards folder

apiVersion: 1

providers:
  - name: 'Market Research API Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
